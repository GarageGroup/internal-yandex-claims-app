name: Deploy Application

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional artifact version (for example: v1.2.3)."
        required: false
        type: string

      skip_deploy:
        description: "Skip Function App deployment"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-application:
    if: ${{ !inputs.skip_deploy && always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    env:
      FUNCTION_APP_NAME: "func-${{ vars.AZURE_NAME_ROOT }}"
      FUNCTION_RESOURCE_GROUP_NAME: "rg-${{ vars.AZURE_NAME_ROOT }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version
        id: get_version
        run: |
          version_input="${{ github.event.inputs.version }}"
          if [ -n "$version_input" ]; then
            version="$version_input"
          else
            version="$(echo "$GITHUB_REF" | cut -d / -f 3)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Ensure Publish Directory Exists
        run: mkdir -p ./publish

      - name: Download from Blob Storage
        run: |
          az storage blob download \
            --name "${{ vars.AZURE_ARTIFACT_NAME }}-${{ steps.get_version.outputs.version }}.zip" \
            --file "./publish/${{ vars.AZURE_ARTIFACT_NAME }}-${{ steps.get_version.outputs.version }}.zip" \
            --account-name "${{ vars.AZURE_ARTIFACT_ACCOUNT_NAME }}" \
            --container-name "${{ vars.AZURE_ARTIFACT_CONTAINER_NAME }}" \
            --account-key "${{ secrets.AZURE_ACCOUNT_KEY_ARTIFACT }}"

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ vars.DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.DEPLOY_TENANT_ID }}
          subscription-id: ${{ vars.DEPLOY_SUBSCRIPTION_ID }}

      - name: Deploy to Azure
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ./publish/${{ vars.AZURE_ARTIFACT_NAME }}-${{ steps.get_version.outputs.version }}.zip
          remote-build: false

      - name: Set Function App Settings
        uses: azure/cli@v3
        env:
          AZURE_RESOURCE_GROUP_NAME: ${{ env.FUNCTION_RESOURCE_GROUP_NAME }}
          AZURE_FUNCTION_NAME: ${{ env.FUNCTION_APP_NAME }}
        with:
          inlineScript: |
            bash ./.infra/scripts/set-function-app-settings.sh

      - name: Azure Logout
        uses: azure/cli@v3
        with:
          inlineScript: az logout

  ping-application:
    if: ${{ !inputs.skip_deploy && always() && needs.deploy-application.result == 'success' }}
    runs-on: ubuntu-latest
    needs: deploy-application
    env:
      FUNCTION_APP_NAME: "func-${{ vars.AZURE_NAME_ROOT }}"
      FUNCTION_RESOURCE_GROUP_NAME: "rg-${{ vars.AZURE_NAME_ROOT }}"

    steps:
      - name: Get version
        id: get_version
        run: |
          version_input="${{ github.event.inputs.version }}"
          if [ -n "$version_input" ]; then
            version="$version_input"
          else
            version="$(echo "$GITHUB_REF" | cut -d / -f 3)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ vars.DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.DEPLOY_TENANT_ID }}
          subscription-id: ${{ vars.DEPLOY_SUBSCRIPTION_ID }}

      - name: Get Function master key
        id: get_master_key
        uses: azure/cli@v3
        with:
          inlineScript: |
            master_key="$(az functionapp keys list \
              --resource-group "${{ env.FUNCTION_RESOURCE_GROUP_NAME }}" \
              --name "${{ env.FUNCTION_APP_NAME }}" \
              --query "masterKey" \
              --output tsv)"

            if [ -z "${master_key}" ]; then
              echo "Failed to resolve Function App master key" >&2
              exit 1
            fi
            echo "::add-mask::${master_key}"

            echo "master_key=${master_key}" >> "$GITHUB_OUTPUT"

      - name: Ping Health Check URL
        uses: GarageGroup/platform-ping-app@v0.2.0
        with:
          health_check_url: https://${{ env.FUNCTION_APP_NAME }}.azurewebsites.net/health
          headers: x-functions-key:${{ steps.get_master_key.outputs.master_key }}
          contains: ${{ steps.get_version.outputs.version }}
          is_end_of_line_match: true
          retry_delay_in_seconds: 15
          max_attempts: 10

      - name: Azure Logout
        uses: azure/cli@v3
        with:
          inlineScript: az logout
